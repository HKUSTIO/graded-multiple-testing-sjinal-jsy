name: Autograding Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  autograde:
    name: Run Grading
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Core test 1 Bonferroni and Holm
        id: coretest1
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 1 Bonferroni and Holm
          setup-command: ""
          command: uv run pytest tests/test_core.py::test_bonferroni_and_holm_on_fixed_vector -q
          timeout: 10
          max-score: 18

      - name: Core test 2 BH and BY
        id: coretest2
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 2 BH and BY
          setup-command: ""
          command: uv run pytest tests/test_core.py::test_bh_and_by_on_fixed_vector -q
          timeout: 10
          max-score: 18

      - name: Core test 3 FWER FDR power helpers
        id: coretest3
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 3 FWER FDR power helpers
          setup-command: ""
          command: uv run pytest tests/test_core.py::test_fwer_fdr_power_helpers -q
          timeout: 10
          max-score: 12

      - name: Core test 4 summary metrics
        id: coretest4
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 4 summary metrics
          setup-command: ""
          command: uv run pytest tests/test_core.py::test_summary_metrics_on_fixed_tables -q
          timeout: 10
          max-score: 12

      - name: Core test 5 required project files
        id: coretest5
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 5 required project files
          setup-command: ""
          command: uv run pytest tests/test_workflow_modifiable.py::test_required_project_files_exist -q
          timeout: 10
          max-score: 5

      - name: Core test 6 report references pipeline script
        id: coretest6
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Core test 6 report references pipeline script
          setup-command: ""
          command: uv run pytest tests/test_workflow_modifiable.py::test_report_references_run_script -q
          timeout: 10
          max-score: 5

      - name: Prepare report artifacts
        run: uv run python scripts/run_cleaning.py && uv run python scripts/run_analysis.py && uv run quarto render report/solution.qmd

      - name: Report test 1 output files
        id: reporttest1
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Report test 1 output files
          setup-command: ""
          command: uv run pytest tests/test_report.py::test_output_files_exist_after_run -q
          timeout: 10
          max-score: 10

      - name: Report test 2 results keys
        id: reporttest2
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Report test 2 results keys
          setup-command: ""
          command: uv run pytest tests/test_report.py::test_results_json_has_required_keys -q
          timeout: 10
          max-score: 10

      - name: Report test 3 rendered html sections
        id: reporttest3
        continue-on-error: true
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Report test 3 rendered html sections
          setup-command: ""
          command: uv run pytest tests/test_report.py::test_rendered_html_exists_and_contains_required_sections -q
          timeout: 10
          max-score: 10

      - name: Classroom reporter
        if: always()
        id: grading-reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CORETEST1_RESULTS: "${{ steps.coretest1.outputs.result }}"
          CORETEST2_RESULTS: "${{ steps.coretest2.outputs.result }}"
          CORETEST3_RESULTS: "${{ steps.coretest3.outputs.result }}"
          CORETEST4_RESULTS: "${{ steps.coretest4.outputs.result }}"
          CORETEST5_RESULTS: "${{ steps.coretest5.outputs.result }}"
          CORETEST6_RESULTS: "${{ steps.coretest6.outputs.result }}"
          REPORTTEST1_RESULTS: "${{ steps.reporttest1.outputs.result }}"
          REPORTTEST2_RESULTS: "${{ steps.reporttest2.outputs.result }}"
          REPORTTEST3_RESULTS: "${{ steps.reporttest3.outputs.result }}"
        with:
          runners: coretest1,coretest2,coretest3,coretest4,coretest5,coretest6,reporttest1,reporttest2,reporttest3

      - name: Generate feedback content
        if: always()
        run: |
          python - <<'PY'
          import base64
          import json
          import os

          ORDER = [
              "coretest1",
              "coretest2",
              "coretest3",
              "coretest4",
              "coretest5",
              "coretest6",
              "reporttest1",
              "reporttest2",
              "reporttest3",
          ]

          rows = []
          for step_id in ORDER:
              raw = (os.environ.get(step_id.upper().replace("-", "_") + "_RESULT", "") or "").strip()
              if raw:
                  try:
                      decoded = base64.b64decode(raw).decode("utf-8")
                  except Exception:
                      raise ValueError(f"Invalid base64 grader result for {step_id}: {raw!r}")
                  if not (decoded.startswith("{") and decoded.endswith("}")):
                      raise ValueError(f"Invalid decoded grader result for {step_id}: {decoded!r}")
                  result = json.loads(decoded)
                  if not isinstance(result, dict):
                      raise ValueError(f"Invalid grader result type for {step_id}: {type(result).__name__}")
                  name = result.get("name", step_id)
                  max_score = int(result.get("max_score", 0))
                  if "score" in result:
                      score = int(result["score"])
                  else:
                      tests = result.get("tests", [])
                      score = int(sum(int(test.get("score", 0)) for test in tests))
              else:
                  name = step_id
                  score = 0
                  max_score = 0
              status = "pass" if score == max_score else "fail"
              rows.append((name, status, score, max_score))

          total = sum(score for _, _, score, _ in rows)
          with open("comment.md", "w", encoding="utf-8") as f:
              f.write("## Autograding Results\n\n")
              f.write("| Component | Status | Points |\n")
              f.write("|-----------|--------|--------|\n")
              for name, status, score, max_score in rows:
                  f.write(f"| {name} | {status} | {score}/{max_score} |\n")
              f.write(f"| Total |  | {total}/100 |\n")
          PY
        env:
          CORETEST1_RESULT: ${{ steps.coretest1.outputs.result }}
          CORETEST2_RESULT: ${{ steps.coretest2.outputs.result }}
          CORETEST3_RESULT: ${{ steps.coretest3.outputs.result }}
          CORETEST4_RESULT: ${{ steps.coretest4.outputs.result }}
          CORETEST5_RESULT: ${{ steps.coretest5.outputs.result }}
          CORETEST6_RESULT: ${{ steps.coretest6.outputs.result }}
          REPORTTEST1_RESULT: ${{ steps.reporttest1.outputs.result }}
          REPORTTEST2_RESULT: ${{ steps.reporttest2.outputs.result }}
          REPORTTEST3_RESULT: ${{ steps.reporttest3.outputs.result }}

      - name: Publish run summary
        if: always()
        run: cat comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post comment to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Autograding Results'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }